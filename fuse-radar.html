/* ============================================================
   RADAR (hero visual)
   ============================================================ */
function Radar({ trends, onSelect, compact=false }) {
  const size = 100; // viewBox units, center 50,50
  const cx = 50, cy = 50, R = 44;
  const rings = [0.28, 0.55, 0.82, 1];
  return (
    <div className="relative aspect-square w-full">
      {/* glow backdrop */}
      <div className="absolute inset-0 rounded-full" style={{ background:"radial-gradient(circle, rgba(212,255,0,0.10), transparent 62%)" }}></div>

      <svg viewBox="0 0 100 100" className="absolute inset-0 h-full w-full">
        <defs>
          <radialGradient id="sweepg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="rgba(212,255,0,0.0)"/>
            <stop offset="70%" stopColor="rgba(212,255,0,0.0)"/>
            <stop offset="100%" stopColor="rgba(212,255,0,0.35)"/>
          </radialGradient>
          <clipPath id="rclip"><circle cx="50" cy="50" r={R}/></clipPath>
        </defs>

        {rings.map((r,i)=>(
          <circle key={i} cx={cx} cy={cy} r={R*r} fill="none" stroke="rgba(255,255,255,0.10)" strokeWidth="0.3"/>
        ))}
        {/* crosshairs */}
        <line x1={cx} y1={cy-R} x2={cx} y2={cy+R} stroke="rgba(255,255,255,0.08)" strokeWidth="0.3"/>
        <line x1={cx-R} y1={cy} x2={cx+R} y2={cy} stroke="rgba(255,255,255,0.08)" strokeWidth="0.3"/>
        <line x1={cx-R*0.7} y1={cy-R*0.7} x2={cx+R*0.7} y2={cy+R*0.7} stroke="rgba(255,255,255,0.05)" strokeWidth="0.3"/>
        <line x1={cx-R*0.7} y1={cy+R*0.7} x2={cx+R*0.7} y2={cy-R*0.7} stroke="rgba(255,255,255,0.05)" strokeWidth="0.3"/>

        {/* sweep */}
        <g clipPath="url(#rclip)">
          <g className="radar-sweep" style={{ transformOrigin:"50px 50px" }}>
            <path d={`M50 50 L50 ${50-R} A${R} ${R} 0 0 1 ${50+R} 50 Z`} fill="url(#sweepg)"/>
            <line x1="50" y1="50" x2="50" y2={50-R} stroke="rgba(212,255,0,0.7)" strokeWidth="0.4"/>
          </g>
        </g>
        <circle cx={cx} cy={cy} r="1.1" fill="#d4ff00"/>
      </svg>

      {/* dots + labels */}
      {trends.map((t)=>{
        const a = (t.radar.angle-90) * Math.PI/180;
        const rr = t.radar.radius;
        const px = 50 + Math.cos(a)*R*rr;
        const py = 50 + Math.sin(a)*R*rr;
        const dot = STATUS_META[t.status].dot;
        const right = px > 50;
        return (
          <button key={t.id} onClick={()=>onSelect && onSelect(t)}
            className="group absolute -translate-x-1/2 -translate-y-1/2"
            style={{ left:`${px}%`, top:`${py}%` }}>
            <span className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full ring-pulse"
                  style={{ width:18, height:18, border:`1px solid ${dot}` }}></span>
            <span className="relative block rounded-full" style={{ width:9, height:9, background:dot, boxShadow:`0 0 12px ${dot}`, animation:"pulse-dot 2.6s ease-in-out infinite" }}></span>
            {!compact &&
              <span className={"pointer-events-none absolute top-1/2 -translate-y-1/2 whitespace-nowrap font-mono text-[10px] uppercase tracking-wider transition-all duration-300 group-hover:text-paper " + (right ? "left-4 text-left" : "right-4 text-right")}
                    style={{ color:"rgba(244,244,239,0.7)" }}>
                {t.name}
              </span>}
          </button>
        );
      })}
    </div>
  );
}

function Reports() {
  const [active, setActive] = useState(null);
  const [phase, setPhase] = useState("idle"); // idle | building | done
  const timer = useRef(null);

  function generate(r) {
    setActive(r.id); setPhase("building");
    clearTimeout(timer.current);
    timer.current = setTimeout(()=> setPhase("done"), 1800);
  }
  useEffect(()=>()=>clearTimeout(timer.current),[]);

  return (
    <div data-view className="px-6 py-20 lg:px-14 lg:py-16">
      <SectionLabel n="06">Monthly Report Generator</SectionLabel>
      <div className="flex flex-wrap items-end justify-between gap-4">

        <p className="max-w-xs text-sm text-muted">Turn the live radar into client-ready outputs in one click — formatted, branded, on tone.</p>
      </div>

      <div className="mt-10 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
        {REPORTS.map((r,i)=>{
          const hex = accentHex[r.accent];
          const isActive = active===r.id;
          return (
            <div key={r.id} className="card-grad hoverlift flex flex-col rounded-2xl border border-line p-7 float-up" style={{animationDelay:`${i*50}ms`}}>
              <div className="flex items-start justify-between">
                <span className="grid h-11 w-11 place-items-center rounded-xl border border-line text-xl" style={{color:hex}}>{r.icon}</span>
                <span className="font-mono text-[10px] uppercase tracking-widest text-muted">{r.fmt}</span>
              </div>
              <h3 className="mt-5 font-display text-xl font-bold">{r.title}</h3>
              <p className="mt-2 flex-1 text-sm leading-relaxed text-muted">{r.desc}</p>

              <button onClick={()=>generate(r)}
                className="mt-6 flex items-center justify-center gap-2 rounded-full border px-5 py-3 font-display text-sm font-bold transition-all"
                style={ isActive && phase!=="idle"
                  ? { borderColor:hex, color:"#050505", background:hex }
                  : { borderColor:"rgba(255,255,255,0.09)", color:"#f4f4ef" } }>
                {isActive && phase==="building" && <span>Generating…</span>}
                {isActive && phase==="done" && <span>✓ Ready — Download</span>}
                {(!isActive || phase==="idle") && <span>Generate · {r.time}</span>}
              </button>

              {isActive && phase==="building" &&
                <div className="mt-3 h-1 w-full overflow-hidden rounded-full bg-white/10">
                  <div className="h-full rounded-full" style={{background:hex, animation:"sweep 1.8s linear", width:"100%", transformOrigin:"left", animationName:"none"}}></div>
                  <div className="h-full -mt-1 rounded-full" style={{background:hex, width:"60%", transition:"width 1.6s ease"}}></div>
                </div>}
            </div>
          );
        })}

        {/* live preview tile */}
        <div className="card-grad rounded-2xl border border-line p-7">
          <div className="font-mono text-[10px] uppercase tracking-widest text-muted">Output preview</div>
          <div className="mt-4 rounded-xl border border-line bg-black/40 p-5 font-mono text-xs leading-relaxed text-muted">
            <div className="text-chartreuse">FUSE://radar/report</div>
            <div className="mt-2">› month .... <span className="text-paper">JUN 2026</span></div>
            <div>› signals .. <span className="text-paper">12 tracked</span></div>
            <div>› upgrades . <span className="text-neon">+3</span></div>
            <div>› retired .. <span className="text-orange">1</span></div>
            <div className="mt-2 text-paper">{phase==="done" ? "✓ Document built." : phase==="building" ? "Compiling layout…" : "Awaiting generate…"}<span className="blink">▌</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT
   ============================================================ */
function App() {
  const [view, setView] = useState("home");
  const [trend, setTrend] = useState(TRENDS[0]);
  const [navOpen, setNavOpen] = useState(false);
  const scrollRef = useRef(null);

  function go(v){ setView(v); if(scrollRef.current) scrollRef.current.scrollTop = 0; }
  function openTrend(t){ setTrend(t); go("detail"); }

  return (
    <div className="flex min-h-screen">
      <Sidebar view={view} go={go} open={navOpen} setOpen={setNavOpen}/>
      <main ref={scrollRef} className="h-screen flex-1 overflow-y-auto lg:ml-[240px]">
        <div className="pt-14 lg:pt-0">
          {view==="home" && <Hero go={go} openTrend={openTrend}/>}
          {view==="dashboard" && <Dashboard openTrend={openTrend}/>}
          {view==="detail" && <TrendDetail trend={trend} go={go} openTrend={openTrend}/>}
          {view==="picks" && <Picks/>}
          {view==="translator" && <Translator/>}
          {view==="score" && <ScoreSystem/>}
          {view==="reports" && <Reports/>}

          <footer className="border-t border-line px-6 py-10 lg:px-14">
            <div className="flex flex-wrap items-center justify-between gap-4">
              <Logo size={18}/>
              <p className="font-mono text-[10px] uppercase tracking-widest text-muted">© 2026 FUSE · Creative AI Production Unit · People lead. AI expands. Craft decides.</p>
            </div>
          </footer>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
